name: Update YouTube Videos

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: https://www.youtube.com/feeds/videos.xml?channel_id=UCaFG6M88w-oabfQG8ifaz2w
          comment_tag_name: YOUTUBE
          readme_path: ./README.md
          max_post_count: 5
